<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceboy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');

        body {
            margin: 0; overflow: hidden;
            background-color: #050508; 
            color: #f1c40f; 
            font-family: 'Courier Prime', monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }

        /* Minimal UI Top Bar */
        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; background: rgba(10, 15, 20, 0.75);
            padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid #e74c3c; pointer-events: none; backdrop-filter: blur(5px);
            align-items: center; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .min-stat { display: flex; align-items: center; gap: 10px; color: #ecf0f1; font-size: 14px; font-family: 'Oswald', sans-serif; letter-spacing: 1px; white-space: nowrap; }
        .min-bar-bg { width: 120px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        .min-bar-fg { height: 100%; transition: width 0.1s; }
        .hp-color { background: #e74c3c; }
        .fuel-color { background: #3498db; }

        #minimap-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(10, 10, 15, 0.6); border: 1px solid rgba(241, 196, 15, 0.5);
            padding: 4px; border-radius: 10px; backdrop-filter: blur(3px); pointer-events: none;
        }
        #minimapCanvas { border-radius: 6px; }

        /* Top Left Controls */
        #top-left-controls { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; }
        .ctrl-btn {
            background: rgba(10,15,20,0.8); color: #bdc3c7; border: 1px solid #555;
            padding: 8px 12px; cursor: pointer; font-family: 'Courier Prime', monospace;
            border-radius: 8px; font-size: 12px; pointer-events: auto;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.2); }

        /* Responsive Scaling for Mobile Screens */
        @media (max-width: 900px) {
            #ui-top { top: 10px; padding: 8px 15px; gap: 10px; width: 85%; max-width: 600px; flex-wrap: wrap; justify-content: center; border-radius: 15px; }
            .min-stat { font-size: 11px; gap: 5px; }
            .min-stat:nth-child(n+3) { border-left: none; padding-left: 0; }
            .min-bar-bg { width: 70px; height: 8px; }
            #top-left-controls { top: 75px; left: 10px; flex-direction: column; }
            #minimap-panel { top: 75px; right: 10px; transform: scale(0.6); transform-origin: top right; }
            #mobile-actions { bottom: 20px !important; right: 20px !important; gap: 10px !important; }
            .mob-btn { width: 40px !important; height: 40px !important; font-size: 10px !important; }
            #mobile-actions .mob-btn:last-child { width: 55px !important; height: 55px !important; font-size: 14px !important; }
            #touch-joystick { width: 100px !important; height: 100px !important; bottom: 20px !important; left: 20px !important; }
            #touch-knob { width: 40px !important; height: 40px !important; }
            .ctrl-btn { padding: 6px 10px; font-size: 10px; }
        }
        @media (max-width: 500px) {
            .min-bar-bg { width: 50px; }
            #ui-top { gap: 8px; width: 95%; padding: 6px 5px; }
            #top-left-controls { top: 85px; }
            #minimap-panel { top: 85px; transform: scale(0.5); }
        }

        /* Mobile Controls */
        .mob-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); 
            color: #fff; border-radius: 50%; width: 50px; height: 50px; font-family: 'Oswald';
            pointer-events: auto; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .mob-btn:active { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="top-left-controls">
        <button id="touch-toggle" class="ctrl-btn">TOUCH UI: OFF</button>
        <button id="fullscreen-toggle" class="ctrl-btn">FULLSCREEN</button>
    </div>
    
    <div id="touch-joystick" style="display: none; position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 5; pointer-events: auto;">
        <div id="touch-knob" style="position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;"></div>
    </div>
    
    <div id="mobile-actions" style="display: none; position: absolute; bottom: 40px; right: 40px; gap: 15px; z-index: 5; align-items: center;">
        <div class="mob-btn" style="width: 50px; height: 50px; font-size: 12px;" onclick="keys.q = true; setTimeout(()=>keys.q=false, 100)">SWP</div>
        <div class="mob-btn" style="width: 50px; height: 50px; font-size: 12px;" onclick="keys.f = true; setTimeout(()=>keys.f=false, 100)">BMB</div>
        <div class="mob-btn" style="width: 65px; height: 65px; font-size: 16px; background: rgba(231,76,60,0.3); border-color: rgba(231,76,60,0.8);" ontouchstart="mouse.down=true; event.preventDefault();" ontouchend="mouse.down=false; event.preventDefault();" onmousedown="mouse.down=true;" onmouseup="mouse.down=false;">FIRE</div>
    </div>

    <div id="ui-top">
        <div class="min-stat">
            <span style="color: #e74c3c;">HP</span>
            <div class="min-bar-bg"><div id="health-bar" class="min-bar-fg hp-color"></div></div>
        </div>
        <div class="min-stat">
            <span style="color: #3498db;">PWR</span>
            <div class="min-bar-bg"><div id="fuel-bar" class="min-bar-fg fuel-color"></div></div>
        </div>
        <div class="min-stat" style="border-left: 1px solid #444; padding-left: 15px;">
            <span id="weapon-name">PISTOL</span> <span style="color: #7f8c8d;">|</span> BOMBS: <span id="bomb-count" style="color:#e74c3c;">5</span>
        </div>
        <div class="min-stat" id="status-effect" style="display: none; border-left: 1px solid #444; padding-left: 15px; color: #9b59b6;">
            DEF 60s
        </div>
        <div class="min-stat" style="border-left: 1px solid #444; padding-left: 15px; color: #f1c40f;">
            W$<span id="score">0</span>
        </div>
    </div>

    <div id="minimap-panel">
        <canvas id="minimapCanvas" width="160" height="120"></canvas>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/** CORE SETUP */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40, MAP_COLS = 80, MAP_ROWS = 60;
const GRAVITY = 0, FRICTION = 0.85; // Zero gravity for space feel
let score = 0;
let camera = { x: 0, y: 0 };
let screenShake = 0;
let gameScale = 1;

function updateScale() {
    gameScale = Math.min(1, window.innerWidth / 1280); // Base target resolution scaling
    if (gameScale < 0.4) gameScale = 0.4; // Cap zooming out at 40% on tiny phones
}
updateScale(); // Initial scale setup

// Inputs
const keys = { a: false, d: false, w: false, s: false, space: false, q: false, f: false, 1: false, 2: false };
const mouse = { x: 0, y: 0, down: false };
let isTouchUI = () => document.getElementById('touch-joystick').style.display !== 'none';

window.addEventListener('keydown', e => { if(isTouchUI()) return; if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.key===' ') keys.space=true; });
window.addEventListener('keyup', e => { if(isTouchUI()) return; if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.key===' ') keys.space=false; });
window.addEventListener('mousemove', e => { if(isTouchUI()) return; mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { if(isTouchUI()) return; if(e.button===0) mouse.down = true; });
window.addEventListener('mouseup', e => { if(isTouchUI()) return; if(e.button===0) mouse.down = false; });
window.addEventListener('contextmenu', e => e.preventDefault());

let touchJoystick = { active: false, x: 0, y: 0 };
window.addEventListener('touchstart', e => { 
    if(e.target.tagName === 'BUTTON' || e.target.classList.contains('mob-btn') || e.target.closest('#touch-joystick') || e.target.closest('#mobile-actions')) return;
    if(isTouchUI()) return; // Disable tap-to-shoot in mobile mode
    mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
    mouse.down = true;
}, {passive: false});
window.addEventListener('touchmove', e => { 
    if(e.target.tagName === 'BUTTON' || e.target.classList.contains('mob-btn') || e.target.closest('#touch-joystick') || e.target.closest('#mobile-actions')) return;
    if(isTouchUI()) return;
    mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
}, {passive: false});
window.addEventListener('touchend', e => { 
    if(e.target.tagName === 'BUTTON' || e.target.classList.contains('mob-btn') || e.target.closest('#touch-joystick') || e.target.closest('#mobile-actions')) return;
    if(isTouchUI()) return;
    mouse.down = false;
});

/** MAP & ENVIRONMENT GENERATION */
let map = [];
let stars = [];
for(let i=0; i<150; i++) stars.push({ x: Math.random()*MAP_COLS*TILE_SIZE, y: Math.random()*MAP_ROWS*TILE_SIZE, size: Math.random()*2 });
let debris = [];
for(let i=0; i<200; i++) debris.push({
    x: Math.random()*MAP_COLS*TILE_SIZE, y: Math.random()*MAP_ROWS*TILE_SIZE,
    vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
    size: Math.random()*3 + 1, color: Math.random() > 0.5 ? '#555' : '#7f8c8d'
});

function generateMap() {
    for (let y = 0; y < MAP_ROWS; y++) {
        map[y] = [];
        for (let x = 0; x < MAP_COLS; x++) {
            map[y][x] = (x===0 || x===MAP_COLS-1 || y===0 || y===MAP_ROWS-1) ? 1 : (Math.random() < 0.39 ? 1 : 0);
        }
    }
    // Cellular Automata smoothing to make corridors/arenas
    for (let i = 0; i < 4; i++) {
        let newMap = JSON.parse(JSON.stringify(map));
        for (let y = 1; y < MAP_ROWS - 1; y++) {
            for (let x = 1; x < MAP_COLS - 1; x++) {
                let walls = 0;
                for (let ny = y-1; ny <= y+1; ny++) for (let nx = x-1; nx <= x+1; nx++) if (map[ny][nx] === 1) walls++;
                newMap[y][x] = walls > 4 ? 1 : 0;
            }
        }
        map = newMap;
    }
}
function getSpawn(w = 70, h = 70) {
    for (let i=0; i<1000; i++) {
        let x = Math.floor(Math.random()*(MAP_COLS-4))+2;
        let y = Math.floor(Math.random()*(MAP_ROWS-4))+2;
        let px = x * TILE_SIZE + (TILE_SIZE - w)/2;
        let py = y * TILE_SIZE + (TILE_SIZE - h)/2;
        if (!checkCollision(px, py, w, h)) return { x: px, y: py };
    }
    for (let y = 2; y < MAP_ROWS - 2; y++) {
        for (let x = 2; x < MAP_COLS - 2; x++) {
            let px = x * TILE_SIZE + (TILE_SIZE - w)/2;
            let py = y * TILE_SIZE + (TILE_SIZE - h)/2;
            if (!checkCollision(px, py, w, h)) return { x: px, y: py };
        }
    }
    return { x: TILE_SIZE * 2, y: TILE_SIZE * 2 };
}
function checkCollision(x, y, w, h) {
    let l = Math.floor(x/TILE_SIZE), r = Math.floor((x+w)/TILE_SIZE);
    let t = Math.floor(y/TILE_SIZE), b = Math.floor((y+h)/TILE_SIZE);
    for (let ty = t; ty <= b; ty++) {
        for (let tx = l; tx <= r; tx++) {
            if (map[ty] && map[ty][tx] === 1) return true;
        }
    }
    return false;
}

/** ENTITIES & COMBAT SYSTEMS */
let entities = [];
let particles = [];
let bullets = [];
let crates = [];

class Particle {
    constructor(x, y, color, speed, life, isSpark = false) {
        this.x = x; this.y = y; this.color = color;
        let ang = Math.random() * Math.PI * 2;
        this.vx = Math.cos(ang) * speed * Math.random();
        this.vy = Math.sin(ang) * speed * Math.random();
        this.life = life; this.maxLife = life;
        this.size = isSpark ? Math.random() * 2 + 1 : Math.random() * 4 + 2;
        this.isSpark = isSpark;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if(this.isSpark) { this.vx *= 0.95; this.vy *= 0.95; } // Sparks drift in zero-G
        this.life--;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function createParticles(x, y, color, amount, speed, isSpark = false) {
    for (let i = 0; i < amount; i++) {
        let life = 15 + Math.random() * 20; // Randomize the particle lifespan
        particles.push(new Particle(x, y, color, speed, life, isSpark));
    }
}

class Mercenary {
    constructor(x, y, isPlayer) {
        this.x = x; this.y = y; this.w = 70; this.h = 70;
        this.vx = 0; this.vy = 0;
        this.isPlayer = isPlayer;

        // Stats
        this.maxHp = isPlayer ? 100 : 50;
        this.hp = this.maxHp;
        this.maxFuel = 100;
        this.fuel = this.maxFuel;
        
        // Aesthetic
        this.color = isPlayer ? '#2c3e50' : '#8e44ad'; // Player: Suit Blue. Enemy: Syndicate Purple
        this.shirtColor = isPlayer ? '#f1c40f' : '#c0392b';

        // States
        this.isGrounded = false;
        this.flashTimer = 0;
        this.aimAngle = 0;
        this.thrustAngle = 0;
        this.deflector = false;
        this.deflectorTimer = 0;
        this.exhausted = false;
        
        // Inventory & Weapons
        this.weapons = ['pistol', null];
        this.weaponIndex = 0;
        this.bombs = 5;
        this.swapCooldown = 0;
        this.bombCooldown = 0;
        this.fireCooldown = 0;
        this.aiTimer = 0;
        this.showHealthTimer = 0;
    }

    get weapon() { return this.weapons[this.weaponIndex]; }
    set weapon(val) { this.weapons[this.weaponIndex] = val; }

    takeDamage(amt, knockX, knockY) {
        this.hp -= amt;
        this.flashTimer = 5;
        this.showHealthTimer = 90; // Show health for 1.5 seconds when hit
        this.vx += knockX; this.vy += knockY;
        createParticles(this.x+this.w/2, this.y+this.h/2, '#e74c3c', 5, 4, true); // Blood/sparks

        if(this.hp <= 0 && !this.isPlayer) {
            score += 1500;
            updateUI();
            createParticles(this.x+this.w/2, this.y+this.h/2, '#e74c3c', 20, 6, true);
        }
    }

    update() {
        if(this.hp <= 0) return;
        if(this.flashTimer > 0) this.flashTimer--;
        if(this.fireCooldown > 0) this.fireCooldown--;
        if(this.showHealthTimer > 0) this.showHealthTimer--;
        if(this.swapCooldown > 0) this.swapCooldown--;
        if(this.bombCooldown > 0) this.bombCooldown--;
        if(this.deflectorTimer > 0) {
            this.deflectorTimer--;
            if(this.deflectorTimer <= 0) this.deflector = false;
        }

        let speed = 1.2;
        let thrustActive = false;
        let dx = 0, dy = 0;

        if (this.isPlayer) {
            if (keys.a) dx -= 1;
            if (keys.d) dx += 1;
            if (keys.w || keys.space) dy -= 1;
            if (keys.s) dy += 1;

            if (touchJoystick.active) {
                dx = touchJoystick.x;
                dy = touchJoystick.y;
            }

            // Aiming
            if (isTouchUI()) {
                if (touchJoystick.x !== 0 || touchJoystick.y !== 0) {
                    this.aimAngle = Math.atan2(touchJoystick.y, touchJoystick.x);
                }
            } else {
                let mx = (mouse.x / gameScale) + camera.x;
                let my = (mouse.y / gameScale) + camera.y;
                this.aimAngle = Math.atan2(my - (this.y + this.h/2), mx - (this.x + this.w/2));
            }

            // Shooting
            if (mouse.down && this.fireCooldown <= 0) this.shoot();

            // Swap weapons
            if (keys.q && this.swapCooldown <= 0) {
                this.weaponIndex = (this.weaponIndex + 1) % 2;
                if (!this.weapons[this.weaponIndex]) this.weaponIndex = (this.weaponIndex + 1) % 2; // Skip if null
                this.swapCooldown = 15;
            }
            if (keys['1'] && this.weapons[0] && this.swapCooldown <= 0) { this.weaponIndex = 0; this.swapCooldown = 15; }
            if (keys['2'] && this.weapons[1] && this.swapCooldown <= 0) { this.weaponIndex = 1; this.swapCooldown = 15; }
            
            // Plant Bomb
            if (keys.f && this.bombs > 0 && this.bombCooldown <= 0) {
                this.bombs--;
                this.bombCooldown = 30;
                bullets.push(new Bullet(this.x + this.w/2, this.y + this.h/2, 0, this, 0, 150, 'bomb'));
            }
        } else {
            // Dummy AI
            let p = entities[0];
            let dist = Math.hypot(p.x - this.x, p.y - this.y);
            this.aiTimer++;

            if(dist < 400) {
                this.aimAngle = Math.atan2(p.y - this.y, p.x - this.x);
                if(this.aiTimer % 60 === 0 && Math.random() > 0.3) this.shoot();
                
                if(dist < 200) { dx -= Math.cos(this.aimAngle); dy -= Math.sin(this.aimAngle); }
                else if(dist > 300) { dx += Math.cos(this.aimAngle); dy += Math.sin(this.aimAngle); }

                if(this.y > p.y + 20) dy -= 1;
                else if(this.y < p.y - 20) dy += 1;
            } else {
                // Idle wander
                if(this.aiTimer % 120 === 0) { this.vx = (Math.random()-0.5)*5; this.vy = (Math.random()-0.5)*5; }
            }
        }

        if (this.fuel <= 0) this.exhausted = true;
        if (this.fuel >= 20) this.exhausted = false; // Recharge threshold to un-stall

        // Apply Mobility Unit Thrust
        if ((dx !== 0 || dy !== 0) && !this.exhausted && this.fuel > 0) {
            let angle = Math.atan2(dy, dx);
            this.thrustAngle = angle + Math.PI; // Thruster points opposite to movement direction
            this.vx += Math.cos(angle) * speed;
            this.vy += Math.sin(angle) * speed;
            this.fuel -= 1.5; // Core power drains
            thrustActive = true;
            
            let tx = this.x + this.w/2 + Math.cos(this.thrustAngle) * 41;
            let ty = this.y + this.h/2 + Math.sin(this.thrustAngle) * 41;
            createParticles(tx, ty, '#00ffff', 1, 3); // Fusion core blue thrust
        }

        // Apply friction and gravity
        this.vx *= FRICTION;
        this.vy *= FRICTION;
        this.vy += GRAVITY;
        
        // Physics & Collisions
        this.x += this.vx;
        if (checkCollision(this.x, this.y, this.w, this.h)) {
            if (this.vx > 0) this.x = Math.floor((this.x+this.w)/TILE_SIZE)*TILE_SIZE - this.w - 0.1;
            else if (this.vx < 0) this.x = Math.floor(this.x/TILE_SIZE)*TILE_SIZE + TILE_SIZE + 0.1;
            this.vx = 0;
        }

        this.y += this.vy;
        this.isGrounded = false;
        if (checkCollision(this.x, this.y, this.w, this.h)) {
            if (this.vy > 0) {
                this.y = Math.floor((this.y+this.h)/TILE_SIZE)*TILE_SIZE - this.h - 0.1;
                this.isGrounded = true;
            } else if (this.vy < 0) {
                this.y = Math.floor(this.y/TILE_SIZE)*TILE_SIZE + TILE_SIZE + 0.1;
            }
            this.vy = 0;
        }

        // Core power recharge (slowed down for tactical use)
        if (!thrustActive) {
            this.fuel = Math.min(this.maxFuel, this.fuel + 1);
        }
    }

    shoot() {
        let bx = this.x + this.w/2 + Math.cos(this.aimAngle)*45;
        let by = this.y + this.h/2 + Math.sin(this.aimAngle)*45;
        
        if (this.weapon === 'pistol') {
            bullets.push(new Bullet(bx, by, this.aimAngle, this, 18, 15));
            this.fireCooldown = 15;
            this.vx -= Math.cos(this.aimAngle)*2; // Recoil
        } else if (this.weapon === 'smg') {
            let spread = this.aimAngle + (Math.random()-0.5)*0.2;
            bullets.push(new Bullet(bx, by, spread, this, 20, 10));
            this.fireCooldown = 5;
            this.vx -= Math.cos(this.aimAngle)*1;
        } else if (this.weapon === 'laser') {
            if (this.fuel < this.maxFuel) return; // Needs full core power
            this.fuel = 0; // Drain completely

            let lx = bx, ly = by;
            let dx = Math.cos(this.aimAngle) * 8;
            let dy = Math.sin(this.aimAngle) * 8;
            let hitEntities = new Set();
            
            // Raycast line until it hits an asteroid or max distance
            for (let i = 0; i < 150; i++) {
                lx += dx; ly += dy;
                if (checkCollision(lx, ly, 1, 1)) {
                    createParticles(lx, ly, '#e74c3c', 2, 2, true);
                    break;
                }
                entities.forEach(e => {
                    if (e !== this && e.hp > 0 && lx > e.x && lx < e.x+e.w && ly > e.y && ly < e.y+e.h) {
                        if (!hitEntities.has(e)) {
                            e.takeDamage(999, dx*0.5, dy*0.5); // Instant kill in path
                            hitEntities.add(e);
                        }
                    }
                });
            }
            
            // Add a visual-only beam object to the bullets array
            let startX = bx, startY = by, endX = lx, endY = ly;
            bullets.push({
                timer: 15, update: function() { this.timer--; },
                draw: function(ctx) {
                    ctx.save(); ctx.globalAlpha = this.timer / 15;
                    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
                    ctx.restore();
                }
            });
            this.fireCooldown = 40;
            if (this.isPlayer) screenShake = 4;
        } else if (this.weapon === 'torpedo') {
            bullets.push(new Bullet(bx, by, this.aimAngle, this, 6, 50, 'torpedo'));
            this.fireCooldown = 50;
            this.vx -= Math.cos(this.aimAngle)*4;
            this.weapon = 'pistol'; // Single-use rockets
            if(this.isPlayer) screenShake = 3;
        }
        createParticles(bx, by, '#f1c40f', 4, 5, true); // Flash
    }

    draw(ctx) {
        if(this.hp <= 0) return;
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);

        // Flash white if hit
        let drawColor = this.flashTimer > 0 ? '#ffffff' : this.color;

        // Anime Outline Style
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#000000';

        // Character Body (Space Suit)
        ctx.save();
        ctx.rotate(this.aimAngle);
        
        // Oxygen Tanks (Backpack)
        ctx.fillStyle = '#7f8c8d';
        ctx.beginPath(); ctx.rect(-20, -11, 10, 22); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-15, -11); ctx.lineTo(-15, 11); ctx.stroke(); // Double tank split line
        
        // Space Suit Torso & Shoulders
        ctx.fillStyle = drawColor;
        ctx.beginPath(); ctx.rect(-10, -16, 18, 32); ctx.fill(); ctx.stroke();

        // Arms (Reaching forward)
        // Left Arm
        ctx.beginPath(); ctx.rect(-2, -19, 16, 7); ctx.fill(); ctx.stroke();
        // Right Arm
        ctx.beginPath(); ctx.rect(-2, 12, 16, 7); ctx.fill(); ctx.stroke();
        
        // Helmet
        ctx.fillStyle = drawColor === '#ffffff' ? '#ffffff' : '#bdc3c7'; // Light grey helmet
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();

        // Glass Visor
        ctx.fillStyle = this.shirtColor;
        if(this.flashTimer > 0) ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(2, 0, 10, -Math.PI/2, Math.PI/2);
        ctx.lineTo(-3, 0);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        
        ctx.restore();

        // Space Mobility Unit (Ring)
        ctx.save();
        
        // Draw Ring
        ctx.beginPath();
        ctx.arc(0, 0, 35, 0, Math.PI * 2);
        ctx.strokeStyle = this.deflector ? '#9b59b6' : '#7f8c8d'; // Purple if deflector active
        ctx.lineWidth = 3;
        ctx.stroke();

        // Draw Thruster
        ctx.save();
        ctx.rotate(this.thrustAngle);
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.rect(33, -5, 8, 10); ctx.fill(); ctx.stroke();
        ctx.restore();
        
        // Draw Weapon Mount
        ctx.save();
        ctx.rotate(this.aimAngle);
        ctx.fillStyle = '#333';
        if(this.weapon === 'pistol') {
            ctx.beginPath(); ctx.rect(29, -4, 10, 6); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.rect(35, -3, 10, 6); ctx.fill(); ctx.stroke();
        } else if (this.weapon === 'smg') {
            ctx.beginPath(); ctx.rect(35, -4, 14, 8); ctx.rect(43, 2, 4, 6); ctx.fill(); ctx.stroke();
        } else if (this.weapon === 'laser') {
            ctx.beginPath(); ctx.rect(35, -2, 18, 4); ctx.fill(); ctx.stroke();
            if (this.fuel >= this.maxFuel) {
                ctx.shadowColor = '#e74c3c'; ctx.shadowBlur = 10;
                ctx.fillStyle = '#ff4d4d'; // Bright glowing red
            } else {
                ctx.fillStyle = '#550000'; // Dim unpowered red
            }
            ctx.fillRect(39, -1, 10, 2);
            ctx.shadowBlur = 0; // Reset shadow for other drawings
        } else if (this.weapon === 'torpedo') {
            ctx.beginPath(); ctx.rect(35, -6, 16, 12); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(51, 0, 4, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        ctx.restore(); // End Mobility Unit

        // Enemy Health Bar
        if (!this.isPlayer && this.showHealthTimer > 0) {
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-15, -45, 30, 4);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(-15, -45, 30 * Math.max(0, this.hp / this.maxHp), 4);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.strokeRect(-15, -45, 30, 4);
        }

        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, angle, owner, speed, damage, type = 'normal') {
        this.x = x; this.y = y; this.owner = owner;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.damage = damage;
        this.type = type;
        this.size = type === 'torpedo' ? 6 : (type === 'laser' ? 2 : (type === 'bomb' ? 8 : 4));
        this.timer = type === 'torpedo' ? 150 : (type === 'bomb' ? 180 : 60); // Extended Torpedo range
        this.px = x; this.py = y; // For trail
    }
    update() {
        this.px = this.x; this.py = this.y;
        this.x += this.vx; this.y += this.vy;
        this.timer--;

        const explodeTorpedo = (tx, ty) => {
            screenShake = 10;
            let cx = Math.floor(tx / TILE_SIZE);
            let cy = Math.floor(ty / TILE_SIZE);
            for (let ny = cy - 2; ny <= cy + 2; ny++) {
                for (let nx = cx - 2; nx <= cx + 2; nx++) {
                    // Prevent destroying the outer map bounds
                    if (ny > 0 && ny < MAP_ROWS - 1 && nx > 0 && nx < MAP_COLS - 1) {
                        if (map[ny] && map[ny][nx] === 1) {
                            map[ny][nx] = 0; // Destroy asteroid
                            createParticles(nx*TILE_SIZE + TILE_SIZE/2, ny*TILE_SIZE + TILE_SIZE/2, '#555', 8, 3);
                        }
                    }
                }
            }
        };

        if (this.type === 'bomb' && this.timer <= 0) {
            createParticles(this.x, this.y, '#e74c3c', 30, 8, true);
            explodeTorpedo(this.x, this.y); // Asteroid destruction
            entities.forEach(e => {
                if (e.hp > 0 && Math.hypot(e.x+e.w/2 - this.x, e.y+e.h/2 - this.y) < 120) {
                    e.takeDamage(this.damage, (e.x+e.w/2-this.x)*0.15, (e.y+e.h/2-this.y)*0.15); // Blast physics
                }
            });
            return;
        }

        if (this.type === 'bomb') return; // Bombs remain stationary, skip normal collision

        // Collision with walls
        if(checkCollision(this.x, this.y, this.size, this.size)) {
            this.timer = -1;
            createParticles(this.x, this.y, this.type === 'torpedo' ? '#e74c3c' : '#f1c40f', 5, 3, true);
            if (this.type === 'torpedo') explodeTorpedo(this.x, this.y);
        }

        // Collision with entities
        entities.forEach(e => {
            if(e !== this.owner && e.hp > 0 && this.x > e.x && this.x < e.x+e.w && this.y > e.y && this.y < e.y+e.h) {
                if (e.deflector && this.type !== 'torpedo') {
                    // Deflect the bullet away
                    let cx = e.x + e.w/2, cy = e.y + e.h/2;
                    let reflectAngle = Math.atan2(this.y - cy, this.x - cx);
                    let spd = Math.hypot(this.vx, this.vy);
                    this.vx = Math.cos(reflectAngle) * spd;
                    this.vy = Math.sin(reflectAngle) * spd;
                    this.owner = e; // Change ownership!
                    createParticles(this.x, this.y, '#00ffff', 5, 3, true);
                } else {
                    e.takeDamage(this.damage, this.vx*0.2, -2);
                    this.timer = -1;
                    if(this.type === 'torpedo') {
                        createParticles(this.x, this.y, '#e74c3c', 20, 6, true);
                        explodeTorpedo(this.x, this.y);
                    }
                }
            }
        });
    }
    draw(ctx) {
        if (this.type === 'torpedo') {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'bomb') {
            ctx.fillStyle = (this.timer % 15 < 7) ? '#e74c3c' : '#ffffff';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        } else {
            ctx.strokeStyle = '#f1c40f'; // Tracer
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(this.px, this.py); ctx.lineTo(this.x, this.y); ctx.stroke();
        }
    }
}

class Crate {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type; // 'smg', 'laser', 'torpedo', 'durability', 'deflector'
        this.w = 20; this.h = 20;
        this.bob = Math.random()*Math.PI*2;
    }
    update() {
        this.bob += 0.05;
        let p = entities[0];
        if(p.x < this.x+this.w && p.x+p.w > this.x && p.y < this.y+this.h && p.y+p.h > this.y) {
            if(this.type === 'durability') { p.maxHp += 50; p.hp = p.maxHp; }
            else if (this.type === 'deflector') { p.deflector = true; p.deflectorTimer = 3600; } // 60s at 60fps
            else if (this.type === 'bomb') { p.bombs = Math.min(5, p.bombs + 2); } // Restock 2 bombs
            else { 
                if (p.weapons[0] === this.type || p.weapons[1] === this.type) {
                    if (this.type === 'torpedo') p.weapons[p.weaponIndex] = this.type;
                } else if (!p.weapons[0]) { p.weapons[0] = this.type; p.weaponIndex = 0; }
                else if (!p.weapons[1]) { p.weapons[1] = this.type; }
                else { p.weapons[p.weaponIndex] = this.type; }
            }
            this.dead = true;
            score += 100; // Bonus woolongs for tech
            updateUI();
            createParticles(this.x+10, this.y+10, '#3498db', 10, 5);
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + Math.sin(this.bob)*4);
        
        ctx.lineWidth = 2; ctx.strokeStyle = '#000';
        
        let color = '#3498db', txt = '';
        if(this.type === 'durability') { color = '#2ecc71'; txt = 'DUR'; }
        else if(this.type === 'deflector') { color = '#9b59b6'; txt = 'DEF'; }
        else if(this.type === 'bomb') { color = '#e67e22'; txt = 'BMB'; }
        else if(this.type === 'smg') txt = 'SMG';
        else if(this.type === 'laser') txt = 'LSR';
        else if(this.type === 'torpedo') txt = 'TOR';

        ctx.fillStyle = color;
        ctx.beginPath(); ctx.rect(0, 0, this.w, this.h); ctx.fill(); ctx.stroke();
        
        // Icon
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = '12px "Oswald"';
        ctx.fillText(txt, this.w/2, this.h/2 + 1);

        ctx.restore();
    }
}

function updateUI() {
    let p = entities[0];
    if(!p) return;
    document.getElementById('health-bar').style.width = Math.max(0, (p.hp/p.maxHp)*100) + '%';
    document.getElementById('fuel-bar').style.width = Math.max(0, (p.fuel/p.maxFuel)*100) + '%';
    
    let names = { 'pistol': 'BASIC SEMI-AUTO', 'smg': 'SUBMACHINE GUN', 'laser': 'LASER SHOOTER', 'torpedo': 'TORPEDO SHOOTER', null: 'EMPTY' };
    let w1 = names[p.weapons[0]] || 'NONE';
    let w2 = names[p.weapons[1]] || 'NONE';

function drawMinimap() {
    // Clear
    mmCtx.clearRect(0, 0, mmCanvas.width, mmCanvas.height);
    
    let scaleX = mmCanvas.width / (MAP_COLS * TILE_SIZE);
    let scaleY = mmCanvas.height / (MAP_ROWS * TILE_SIZE);

    // Draw Map Layout
    mmCtx.fillStyle = 'rgba(241, 196, 15, 0.4)'; // Bebop Yellow ghosted
    for (let y = 0; y < MAP_ROWS; y++) {
        for (let x = 0; x < MAP_COLS; x++) {
            if (map[y][x] === 1) {
                mmCtx.fillRect(x * TILE_SIZE * scaleX, y * TILE_SIZE * scaleY, TILE_SIZE * scaleX, TILE_SIZE * scaleY);
            }
        }
    }

    // Draw Player Only (Radar style)
    let p = entities[0];
    if(p && p.hp > 0) {
        mmCtx.fillStyle = '#00ffff'; // Cyan dot for player
        mmCtx.beginPath();
        mmCtx.arc(p.x * scaleX, p.y * scaleY, 3, 0, Math.PI*2);
        mmCtx.fill();
        
        // Vision cone approximation
        mmCtx.fillStyle = 'rgba(0, 255, 255, 0.2)';
        mmCtx.beginPath();
        mmCtx.moveTo(p.x * scaleX, p.y * scaleY);
        mmCtx.arc(p.x * scaleX, p.y * scaleY, 40, p.aimAngle - 0.5, p.aimAngle + 0.5);
        mmCtx.fill();
    }
}

/** MAIN LOOP */
function gameLoop() {
    let player = entities[0];
    
    // UPDATE
    entities.forEach(e => e.update());
    entities = entities.filter(e => e.hp > 0 || e.isPlayer);
    bullets.forEach(b => b.update());
    bullets = bullets.filter(b => b.timer > 0);
    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
    crates.forEach(c => c.update());
    crates = crates.filter(c => !c.dead);

    // Update Ambient Debris
    debris.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        if(d.x < 0) d.x += MAP_COLS*TILE_SIZE; else if(d.x > MAP_COLS*TILE_SIZE) d.x -= MAP_COLS*TILE_SIZE;
        if(d.y < 0) d.y += MAP_ROWS*TILE_SIZE; else if(d.y > MAP_ROWS*TILE_SIZE) d.y -= MAP_ROWS*TILE_SIZE;
    });

    // Camera follow (smooth)
    camera.x += ((player.x + player.w/2 - (canvas.width/gameScale)/2) - camera.x) * 0.1;
    camera.y += ((player.y + player.h/2 - (canvas.height/gameScale)/2) - camera.y) * 0.1;

    // Screen Shake
    let sx = (Math.random()-0.5)*screenShake; let sy = (Math.random()-0.5)*screenShake;
    if(screenShake > 0) screenShake *= 0.9;

    updateUI(); // Keep fuel bar updated

    // DRAW BACKGROUND
    ctx.fillStyle = '#050508'; // Space
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.scale(gameScale, gameScale);

    // Parallax Stars
    ctx.fillStyle = '#ffffff';
    stars.forEach(s => {
        let px = (s.x - camera.x * 0.1) % (MAP_COLS*TILE_SIZE);
        let py = (s.y - camera.y * 0.1) % (MAP_ROWS*TILE_SIZE);
        if(px < 0) px += MAP_COLS*TILE_SIZE; if(py < 0) py += MAP_ROWS*TILE_SIZE;
        ctx.globalAlpha = Math.random() > 0.9 ? 0.5 : 1; // Twinkle
        ctx.beginPath(); ctx.arc(px, py, s.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // WORLD SPACE
    ctx.save();
    ctx.translate(-camera.x + sx, -camera.y + sy);

    // Draw Map (Blocky Asteroid structures)
    let ts = TILE_SIZE;

    for (let y = 0; y < MAP_ROWS; y++) {
        for (let x = 0; x < MAP_COLS; x++) {
            if (map[y][x] === 1) {
                // Culling
                if (x*ts > camera.x - ts && x*ts < camera.x + canvas.width/gameScale &&
                    y*ts > camera.y - ts && y*ts < camera.y + canvas.height/gameScale) {
                    
                    // Base rock
                    ctx.fillStyle = '#555';
                    ctx.fillRect(x * ts, y * ts, ts, ts);
                    
                    // Block borders to give depth and grid texture
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x * ts, y * ts, ts, ts);
                    
                    // Blocky crater/surface details
                    if ((x*13 + y*7) % 4 === 0) {
                        ctx.fillStyle = '#444';
                        ctx.fillRect(x * ts + ts*0.2, y * ts + ts*0.2, ts*0.4, ts*0.4);
                    } else if ((x*7 + y*13) % 5 === 0) {
                        ctx.fillStyle = '#666';
                        ctx.fillRect(x * ts + ts*0.6, y * ts + ts*0.6, ts*0.2, ts*0.2);
                    }
                }
            }
        }
    }

    // Draw Ambient Debris
    ctx.globalAlpha = 0.5;
    debris.forEach(d => {
        if (d.x > camera.x - 10 && d.x < camera.x + canvas.width/gameScale + 10 &&
            d.y > camera.y - 10 && d.y < camera.y + canvas.height/gameScale + 10) {
            ctx.fillStyle = d.color;
            ctx.fillRect(d.x, d.y, d.size, d.size);
        }
    });
    ctx.globalAlpha = 1;

    crates.forEach(c => c.draw(ctx));
    bullets.forEach(b => b.draw(ctx));
    particles.forEach(p => p.draw(ctx));

    // Draw Entities
    entities.forEach(e => {
        // Simple Line of Sight/Distance check to render
        if(e.isPlayer || Math.hypot(e.x - player.x, e.y - player.y) < 800) e.draw(ctx);
    });

    ctx.restore();
    ctx.restore(); // Restore global context scale

    // Render Minimap
    drawMinimap();

    // Death Screen (Cowboy Bebop iconic fade out)
    if(player.hp <= 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.fillStyle = '#ecf0f1'; 
        ctx.font = '30px "Times New Roman", serif';
        ctx.textAlign = 'center';
        ctx.fillText("DON'T GIVE UP SPACEBOY...", canvas.width/2, canvas.height/2);
        
        ctx.font = '16px "Courier Prime", monospace';
        ctx.fillStyle = '#e74c3c';
        ctx.fillText("SYSTEM CONNECTION LOST - REFRESH TO RECONNECT", canvas.width/2, canvas.height/2 + 40);
        return; 
    }

    requestAnimationFrame(gameLoop);
}

const joyBase = document.getElementById('touch-joystick');
const joyKnob = document.getElementById('touch-knob');
let joyActive = false, joyCenter = { x: 0, y: 0 };

joyBase.addEventListener('touchstart', e => {
    e.preventDefault(); joyActive = true;
    let rect = joyBase.getBoundingClientRect();
    joyCenter.x = rect.left + rect.width / 2; joyCenter.y = rect.top + rect.height / 2;
    updateJoy(e.touches[0]);
}, {passive: false});
joyBase.addEventListener('touchmove', e => { e.preventDefault(); if (joyActive) updateJoy(e.touches[0]); }, {passive: false});
joyBase.addEventListener('touchend', e => { e.preventDefault(); joyActive = false; joyKnob.style.transform = `translate(-50%, -50%)`; touchJoystick.x = 0; touchJoystick.y = 0; touchJoystick.active = false; }, {passive: false});

function updateJoy(touch) {
    let dx = touch.clientX - joyCenter.x, dy = touch.clientY - joyCenter.y, dist = Math.hypot(dx, dy);
    if (dist > 40) { dx = (dx/dist)*40; dy = (dy/dist)*40; }
    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    touchJoystick.x = dx / 40; touchJoystick.y = dy / 40; touchJoystick.active = true;
}
